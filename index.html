<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expeditors QR Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- QR Code library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 30px 40px;
            width: 100%;
            max-width: 520px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            color: #002f6c;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #555;
            margin-bottom: 25px;
        }

        .question {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        #qrcode {
            margin: 20px auto;
            width: fit-content;
        }

        .hint {
            font-size: 14px;
            color: #666;
            margin-top: 20px;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>📦 Expeditors Quiz</h1>
        <div class="subtitle">Scan the QR code to answer</div>

        <div class="question" id="questionText"></div>

        <div id="qrcode"></div>

        <div class="hint">
            Tip: Scan with your phone camera
        </div>

        <div class="footer">
            Expeditors | Knowledge & Fun
        </div>
    </div>

    <script>
        // =========================
        // CONFIGURATION
        // =========================

        // ✅ Replace this with your real answer link
        // Examples:
        // - Microsoft Forms link
        // - SharePoint page
        // - Simple internal web page
        const ANSWER_BASE_URL = "https://forms.office.com/Pages/ResponsePage.aspx?id=YOUR_FORM_ID";

        // Questions bank
        const questions = [
            "What does Expeditors' mission focus on most?",
            "In which year was Expeditors founded?",
            "What does the Expeditors culture emphasize?",
            "What is one key benefit of the Expeditors global network?",
            "What does 'Service Excellence' mean at Expeditors?",
            "Which Expeditors value focuses on long-term relationships?",
            "What industry does Expeditors primarily operate in?"
        ];

        // =========================
        // LOGIC
        // =========================

        // Pick random question
        const randomIndex = Math.floor(Math.random() * questions.length);
        const selectedQuestion = questions[randomIndex];

        // Show question
        document.getElementById("questionText").innerText = selectedQuestion;

        // Encode question in URL (optional, but nice)
        const encodedQuestion = encodeURIComponent(selectedQuestion);
        const finalUrl = `${ANSWER_BASE_URL}&question=${encodedQuestion}`;

        // Generate QR code
        new QRCode(document.getElementById("qrcode"), {
            text: finalUrl,
            width: 200,
            height: 200,
            colorDark: "#002f6c",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expeditors Daily Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #002f6c, #005daa);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #333;
    }

    .container {
        background: #ffffff;
        max-width: 900px;
        width: 94%;
        padding: 34px 32px 36px;
        border-radius: 18px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        text-align: center;
        animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h1 {
        color: #002f6c;
        margin: 0 0 14px;
        font-size: 1.8em;
    }

    .tag {
        display: inline-block;
        background: #e9f0fc;
        color: #002f6c;
        padding: 6px 14px;
        font-size: 0.85em;
        border-radius: 999px;
        margin-bottom: 16px;
        font-weight: 600;
    }

    .question {
        font-size: 1.35em;
        font-weight: 700;
        line-height: 1.6;
        margin: 22px 0 14px;
    }

    .hint {
        color: #555;
        margin-bottom: 22px;
        font-size: 1.05em;
    }

    .btn {
        background: #ffcc00;
        color: #002f6c;
        border: none;
        padding: 14px 32px;
        font-size: 1.05em;
        font-weight: 700;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        box-shadow: 0 6px 14px rgba(0,0,0,0.25);
    }

    .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .answer {
        display: none;
        margin-top: 26px;
        padding: 20px;
        background: #f4f7fc;
        border-left: 6px solid #002f6c;
        border-radius: 10px;
        text-align: left;
        font-size: 1.15em;
        line-height: 1.6;
    }

    .footer {
        margin-top: 28px;
        font-size: 0.9em;
        color: #666;
    }

    .footer span {
        font-weight: 600;
        color: #002f6c;
    }

    @media (max-width: 600px) {
        h1 { font-size: 1.5em; }
        .question { font-size: 1.2em; }
    }
</style>
</head>

<body>
<div class="container">
    <h1>🚢 Expeditors Knowledge Check</h1>

    <div id="tag" class="tag"></div>

    <div class="question" id="question"></div>

    <div class="hint">Think about the answer, then tap below 👇</div>

    <button class="btn" onclick="showAnswer()">Reveal the answer</button>

    <div class="answer" id="answer"></div>

    <div class="footer">
        🔄 Scan again or refresh for <span>a new question</span>
    </div>
</div>

<script>
/* ============================
   QUESTIONS (duplicates removed)
   ============================ */
const quizRaw = [
    { tag:"Leadership", q:"Who is Expeditors’ President and Chief Executive Officer (CEO)?", a:"Daniel R. Wall." },
    { tag:"Business Model", q:"Does Expeditors own aircraft or ships?", a:"No. Expeditors does not own aircraft or ships and operates as an asset‑light third‑party logistics provider." },
    { tag:"History", q:"When was Expeditors founded?", a:"Expeditors was founded in 1979." },
    { tag:"Growth", q:"How does Expeditors prefer to grow?", a:"Expeditors states it often prefers to grow organically rather than by acquisition." },
    { tag:"Company", q:"Is Expeditors a Fortune 500 company?", a:"Yes. Expeditors is a Fortune 500 service‑based logistics company." },
    { tag:"Investors", q:"What is Expeditors’ stock symbol and exchange?", a:"EXPD on the New York Stock Exchange (NYSE)." },
    { tag:"Global Reach", q:"How many locations and countries does Expeditors operate in?", a:"Expeditors cites 335+ locations across 100 countries." },
    { tag:"Culture", q:"Name one cultural value at Expeditors.", a:"Examples include Integrity, Curiosity, Excellence, Pride, Sense of Humor, Visionary, Attitude, Confidence, Appearance, and Resolute." },
    { tag:"Customer Focus", q:"Why do customers say Expeditors people “care more”?", a:"Expeditors explains this is a deliberate result of its strong culture and values." },
    { tag:"Technology", q:"What does Expeditors highlight as key to competitive advantage?", a:"Innovative solutions, integrated platforms, and strong data quality." },
    { tag:"Quality", q:"Quality at Expeditors is supported by whom?", a:"All employees support the Quality Management System (QMS)." },
    { tag:"Compliance", q:"Why is DG‑trained staff essential?", a:"Because dangerous goods handling must comply with regulations such as IATA DGR and the IMDG Code." },
    { tag:"District Excellence", q:"What is one element included in District Excellence?", a:"The Balanced Scorecard." }
];

/* ============================
   AUTO DEDUPLICATION
   ============================ */
const quiz = Array.from(new Map(quizRaw.map(i => [i.q, i])).values());

/* ============================
   OPTION B – SHUFFLE BAG
   ============================ */
function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

let order = JSON.parse(localStorage.getItem("quizOrder") || "null");
let pos = parseInt(localStorage.getItem("quizPos") || "0", 10);

if (!order || order.length !== quiz.length) {
    order = shuffle([...Array(quiz.length).keys()]);
    pos = 0;
}

if (pos >= order.length) {
    order = shuffle([...Array(quiz.length).keys()]);
    pos = 0;
}

const pick = quiz[order[pos]];
pos++;

localStorage.setItem("quizOrder", JSON.stringify(order));
localStorage.setItem("quizPos", pos);

/* ============================
   RENDER
   ============================ */
document.getElementById("tag").innerText = pick.tag;
document.getElementById("question").innerText = pick.q;
document.getElementById("answer").innerText = pick.a;

function showAnswer() {
    document.getElementById("answer").style.display = "block";
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Expeditors Daily Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body{
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:#f3f6fb;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }
    .card{
      background:#fff;
      padding:32px;
      max-width:820px;
      width:92%;
      border-radius:12px;
      box-shadow:0 6px 18px rgba(0,0,0,.15);
      text-align:center;
    }
    h1{ color:#002f6c; margin:0 0 16px; }
    .question{
      font-size:1.25em;
      line-height:1.6;
      margin:22px 0 10px;
      font-weight:700;
    }
    .prompt{
      margin:12px 0 18px;
      color:#444;
      font-size:1.05em;
    }
    button{
      background:#002f6c;
      color:#fff;
      border:none;
      padding:12px 26px;
      font-size:1em;
      border-radius:6px;
      cursor:pointer;
    }
    button:hover{ background:#004a9f; }

    .answer{
      display:none;
      margin-top:20px;
      padding:16px 18px;
      background:#eef2ff;
      border-left:5px solid #002f6c;
      text-align:left;
      font-size:1.08em;
      white-space:pre-line;
      border-radius:6px;
    }
    .footer{
      margin-top:22px;
      font-size:.9em;
      color:#666;
    }
    .tag{
      display:inline-block;
      margin-top:6px;
      font-size:.85em;
      color:#002f6c;
      background:#e8eefb;
      padding:4px 10px;
      border-radius:999px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🚢 Expeditors Knowledge Check</h1>

    <div id="tag" class="tag" style="display:none;"></div>
    <div class="question" id="question"></div>

    <div class="prompt">Do you know the answer?</div>

    <button onclick="showAnswer()">Show the answer</button>

    <div class="answer" id="answer"></div>

    <div class="footer">
      Refresh the page or scan again for another question
    </div>
  </div>

<script>
  // =========================
  // Quiz bank (website-aligned wording)
  // =========================
  const quiz = [
    { tag:"Leadership", q:"Do you know who is the current CEO of Expeditors?", a:"Expeditors’ President and Chief Executive Officer is Daniel R. Wall." },

    { tag:"Business Model", q:"Does Expeditors own planes, ships, or trucks?", a:"Expeditors states it does not own aircraft or ships (asset‑light third‑party logistics model)." },

    { tag:"History", q:"When was Expeditors founded?", a:"Expeditors was founded in 1979." },

    { tag:"Growth", q:"How does Expeditors prefer to grow—organically or by acquisition?", a:"Expeditors notes it is often better to grow organically rather than by acquisition." },

    { tag:"Company", q:"Is Expeditors a Fortune 500 company?", a:"Yes. Expeditors describes itself as a Fortune 500 service‑based logistics company." },

    { tag:"Investors", q:"What is Expeditors’ stock symbol and exchange?", a:"EXPD on the New York Stock Exchange (NYSE)." },

    { tag:"Global Reach", q:"How many locations and countries does Expeditors operate in (per Expeditors website)?", a:"Expeditors cites 335+ locations in 100 countries." },

    { tag:"Network", q:"How many district offices does Expeditors operate (per its annual report)?", a:"Expeditors reports 172 district offices." },

    { tag:"Culture", q:"Name one of Expeditors’ cultural values.", a:"Examples include Integrity, Curiosity, Excellence, Pride, Sense of Humor (and others listed on the culture page)." },

    { tag:"Customer Service", q:"Expeditors says customers notice their people “care more.” Where is that explained?", a:"On the Our Culture page, which explains clients observe Expeditors people “care more” as a deliberate result of culture and values." },

    { tag:"Technology", q:"What does Expeditors highlight as vital to competitive advantage (annual report)?", a:"Innovative solutions, integrated platforms, and data quality." },

    { tag:"Technology", q:"How does Expeditors describe its global operation model (About Us)?", a:"Unified technology systems integrated across a global network to deliver customized supply chain solutions." },

    { tag:"Quality", q:"Quality is the responsibility of whom at Expeditors?", a:"Expeditors states all employees support the QMS to ensure satisfaction of customers, service providers, governmental authorities, and each other." },

    { tag:"Compliance", q:"Why is DG‑trained staff essential?", a:"Expeditors references key DG regulatory resources (e.g., IATA Dangerous Goods Regulations and the IMDG Code). DG‑trained staff are essential to apply these requirements correctly for compliant handling and transport." },

    { tag:"Quality", q:"What is a Quality Management System (QMS) according to Expeditors?", a:"A QMS is the collection of business policies, standards, procedures, and guidelines used to deliver operational products and services." },

    { tag:"Internal Program", q:"What is District Excellence and what does it contain?", a:"District Excellence is an internal Expeditors program/framework. Public pages do not provide a detailed component list; refer to internal district/CHQ materials for the official structure." }
  ];

  // =========================
  // Option B: Shuffle-bag (no repeats until all used)
  // =========================
  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  let order = JSON.parse(localStorage.getItem("quizOrder") || "null");
  let pos = parseInt(localStorage.getItem("quizPos") || "0", 10);

  if (!order || order.length !== quiz.length) {
    order = shuffle([...Array(quiz.length).keys()]);
    pos = 0;
  }

  if (pos >= order.length) {
    order = shuffle([...Array(quiz.length).keys()]);
    pos = 0;
  }

  const index = order[pos];
  pos++;

  localStorage.setItem("quizOrder", JSON.stringify(order));
  localStorage.setItem("quizPos", String(pos));

  const pick = quiz[index];

  const tagEl = document.getElementById("tag");
  if (pick.tag) {
    tagEl.textContent = pick.tag;
    tagEl.style.display = "inline-block";
  }

  document.getElementById("question").textContent = pick.q;
  document.getElementById("answer").textContent = pick.a;

  function showAnswer() {
    document.getElementById("answer").style.display = "block";
  }
</script>
</body>
</html>
``

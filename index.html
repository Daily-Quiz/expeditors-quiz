<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Expeditors Daily Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body{
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:#f3f6fb;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }
    .card{
      background:#fff;
      padding:32px;
      max-width:860px;
      width:92%;
      border-radius:12px;
      box-shadow:0 6px 18px rgba(0,0,0,.15);
      text-align:center;
    }
    h1{ color:#002f6c; margin:0 0 16px; }
    .tag{
      display:inline-block;
      margin:0 0 10px;
      font-size:.85em;
      color:#002f6c;
      background:#e8eefb;
      padding:4px 10px;
      border-radius:999px;
    }
    .question{
      font-size:1.25em;
      line-height:1.6;
      margin:18px 0 10px;
      font-weight:700;
    }
    .prompt{
      margin:10px 0 18px;
      color:#444;
      font-size:1.05em;
    }
    button{
      background:#002f6c;
      color:#fff;
      border:none;
      padding:12px 26px;
      font-size:1em;
      border-radius:6px;
      cursor:pointer;
    }
    button:hover{ background:#004a9f; }
    .answer{
      display:none;
      margin-top:20px;
      padding:16px 18px;
      background:#eef2ff;
      border-left:5px solid #002f6c;
      text-align:left;
      font-size:1.08em;
      white-space:pre-line;
      border-radius:6px;
    }
    .footer{
      margin-top:22px;
      font-size:.9em;
      color:#666;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🚢 Expeditors Knowledge Check</h1>
    <div id="tag" class="tag" style="display:none;"></div>

    <div class="question" id="question"></div>

    <div class="prompt">Do you know the answer?</div>

    <button onclick="showAnswer()">Show the answer</button>

    <div class="answer" id="answer"></div>

    <div class="footer">
      Refresh the page or scan again for another question
    </div>
  </div>

<script>
  // =========================================================
  // 1) Build quiz bank (website / investor content aligned)
  // =========================================================
  const quizRaw = [
    { tag:"Leadership", q:"Who is Expeditors’ President and Chief Executive Officer (CEO)?",
      a:"Daniel R. Wall." },

    { tag:"Business Model", q:"Does Expeditors own aircraft or ships?",
      a:"No. Expeditors states it does not own aircraft or ships (asset‑light / 3PL model)." },

    { tag:"History", q:"When was Expeditors founded?",
      a:"1979." },

    { tag:"Growth", q:"How does Expeditors say it often prefers to grow (annual report)?",
      a:"Organically rather than by acquisition." },

    { tag:"Company", q:"Is Expeditors a Fortune 500 company?",
      a:"Yes. Expeditors describes itself as a Fortune 500 service‑based logistics company." },

    { tag:"Investors", q:"What is Expeditors’ stock symbol and exchange (per filings/annual report)?",
      a:"EXPD on the New York Stock Exchange (NYSE)." },

    { tag:"Global Reach", q:"According to Expeditors’ company overview, how many locations and countries does it cite?",
      a:"335+ locations in 100 countries." },

    { tag:"Culture", q:"Name one cultural value listed on Expeditors’ culture page.",
      a:"Examples include Integrity, Curiosity, Excellence, Pride, Sense of Humor, Visionary, Attitude, Confidence, Appearance, Resolute." },

    { tag:"Culture", q:"Expeditors says clients observe their people “care more.” Where is this described?",
      a:"On Expeditors’ Our Culture page (it explains this is a deliberate outcome of culture and values)." },

    { tag:"Technology", q:"What does Expeditors say is vital to competitive advantage (annual report)?",
      a:"Innovative solutions, integrated platforms, and data quality." },

    { tag:"Technology", q:"How does Expeditors describe its operating model on About Us?",
      a:"Customized supply chain solutions supported by unified technology systems integrated across a global network." },

    { tag:"Quality", q:"Quality is supported by whom at Expeditors (per Quality at Expeditors page)?",
      a:"All employees support the Quality Management System (QMS)." },

    { tag:"Quality", q:"What is a Quality Management System (QMS) according to Expeditors?",
      a:"A collection of policies, standards, procedures, and guidelines needed to deliver products and services." },

    { tag:"Compliance", q:"Why is DG‑trained staff essential (Expeditors resources alignment)?",
      a:"Because DG handling must follow relevant dangerous goods regulations (Expeditors links to key DG regulatory resources such as IATA DGR and the IMDG Code)." },

    { tag:"District Excellence", q:"What is one element listed under District Excellence in the Quality at Expeditors overview?",
      a:"Balanced Scorecard." }
  ];

  // =========================================================
  // 2) ELIMINATE DUPLICATES (by question text)
  //    If a question is repeated, it will only appear once.
  // =========================================================
  const quiz = Array.from(
    new Map(quizRaw.map(item => [item.q.trim(), item])).values()
  );

  // =========================================================
  // 3) Option B Shuffle-bag (no repeats until all are used)
  // =========================================================
  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  let order = JSON.parse(localStorage.getItem("quizOrder") || "null");
  let pos = parseInt(localStorage.getItem("quizPos") || "0", 10);

  // If quiz list changed (including dedupe), reset the cycle cleanly
  if (!order || order.length !== quiz.length) {
    order = shuffle([...Array(quiz.length).keys()]);
    pos = 0;
  }

  // If reached end, reshuffle new round
  if (pos >= order.length) {
    order = shuffle([...Array(quiz.length).keys()]);
    pos = 0;
  }

  // Pick next question in the shuffle order
  const index = order[pos];
  pos++;

  localStorage.setItem("quizOrder", JSON.stringify(order));
  localStorage.setItem("quizPos", String(pos));

  const pick = quiz[index];

  // Render
  const tagEl = document.getElementById("tag");
  if (pick.tag) {
    tagEl.textContent = pick.tag;
    tagEl.style.display = "inline-block";
  }

  document.getElementById("question").textContent = pick.q;
  document.getElementById("answer").textContent = pick.a;

  function showAnswer() {
    document.getElementById("answer").style.display = "block";
  }
</script>
</body>
</html>
